name: Deploy Dashboard to Cloudflare

on:
  workflow_run:
    workflows: ["MoneyForward Daily Update"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download DB from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p data
          aws s3 cp s3://${{ vars.R2_BUCKET_NAME }}/zaim.db data/zaim.db \
            --endpoint-url https://46efd80dc4ef7479a2640b44866fc6b9.r2.cloudflarestorage.com

      - uses: ./.github/actions/setup-node
      - name: Build web app
        run: pnpm build --filter=@moneyforward-daily-action/web
        env:
          DB_PATH: ${{ github.workspace }}/data/zaim.db
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          NEXT_PUBLIC_GITHUB_ORG: seadoon
          NEXT_PUBLIC_GITHUB_REPO: zaim-dashboard
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 46efd80dc4ef7479a2640b44866fc6b9
