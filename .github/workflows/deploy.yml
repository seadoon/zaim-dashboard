name: Deploy Dashboard to Cloudflare

on:
  workflow_run:
    workflows: ["MoneyForward Daily Update"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Build web app
        run: pnpm build --filter=@moneyforward-daily-action/web
        env:
          DB_PATH: ${{ github.workspace }}/data/zaim.db
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          NEXT_PUBLIC_GITHUB_ORG: seadoon
          NEXT_PUBLIC_GITHUB_REPO: zaim-dashboard
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 46efd80dc4ef7479a2640b44866fc6b9
