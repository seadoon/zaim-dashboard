name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Download DB from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p data
          aws s3 cp s3://${{ vars.R2_BUCKET_NAME }}/zaim.db data/zaim.db \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - uses: ./.github/actions/setup-node

      - name: Run DB migrations
        run: pnpm --filter @moneyforward-daily-action/db run migrate
        env:
          DB_PATH: ${{ github.workspace }}/data/zaim.db
          DRIZZLE_MIGRATIONS_FOLDER: ${{ github.workspace }}/packages/db/drizzle

      - name: Build web app
        run: pnpm build --filter=@moneyforward-daily-action/web
        env:
          DB_PATH: ${{ github.workspace }}/data/zaim.db
          DRIZZLE_MIGRATIONS_FOLDER: ${{ github.workspace }}/packages/db/drizzle
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          NEXT_PUBLIC_GITHUB_ORG: seadoon
          NEXT_PUBLIC_GITHUB_REPO: zaim-dashboard

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
