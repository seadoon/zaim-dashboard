name: Daily Update

on:
  schedule:
    # JST 9:00 → UTC 0:00 (平日のみ)
    - cron: "0 0 * * 1-5"
    # JST 15:30 → UTC 6:30 (平日のみ)
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "daily-update"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        env:
          ZAIM_ID: ${{ secrets.ZAIM_ID }}
          ROBOFOLIO_EMAIL: ${{ secrets.ROBOFOLIO_EMAIL }}
          RUN_TASK: ${{ vars.RUN_TASK }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            YEAR=$(TZ=Asia/Tokyo date +%Y)
            IS_HOLIDAY=$(curl -sf "https://holidays-jp.github.io/api/v1/${YEAR}/date.json" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if '${TODAY}' in d else 'false')" \
              2>/dev/null || echo "false")
            if [ "$IS_HOLIDAY" = "true" ]; then
              echo "Skipping: today (${TODAY}) is a Japanese public holiday"
              echo "should-run=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "should-run=${{ env.ZAIM_ID != '' && env.ROBOFOLIO_EMAIL != '' && env.RUN_TASK == 'true' }}" >> $GITHUB_OUTPUT

  zaim:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Download DB from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p data
          aws s3 cp s3://${{ vars.R2_BUCKET_NAME }}/zaim.db data/zaim.db \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            || echo "No existing DB, starting fresh"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            google-chrome-stable \
            || (wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && sudo apt-get install -y /tmp/chrome.deb)

      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      - name: Fetch Zaim data
        env:
          ZAIM_ID: ${{ secrets.ZAIM_ID }}
          ZAIM_PASSWORD: ${{ secrets.ZAIM_PASSWORD }}
          FETCH_MONTHS: ${{ vars.FETCH_MONTHS || '3' }}
        run: python crawler/fetch_zaim.py

      - name: Upload DB to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp data/zaim.db s3://${{ vars.R2_BUCKET_NAME }}/zaim.db \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

  robofolio:
    needs: [check, zaim]
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node

      - name: Download DB from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p data
          aws s3 cp s3://${{ vars.R2_BUCKET_NAME }}/zaim.db data/zaim.db \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            || echo "No existing DB, starting fresh"

      - run: pnpm --filter @zaim-dashboard/crawler exec playwright install --with-deps chromium
      - run: pnpm --filter @zaim-dashboard/crawler start
        env:
          ROBOFOLIO_EMAIL: ${{ secrets.ROBOFOLIO_EMAIL }}
          ROBOFOLIO_PASSWORD: ${{ secrets.ROBOFOLIO_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_AVATAR_URL: ${{ secrets.DISCORD_AVATAR_URL }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robofolio-debug
          path: apps/crawler/debug/
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload DB to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp data/zaim.db s3://${{ vars.R2_BUCKET_NAME }}/zaim.db \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

  deploy:
    needs: robofolio
    if: needs.robofolio.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Download DB from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p data
          aws s3 cp s3://${{ vars.R2_BUCKET_NAME }}/zaim.db data/zaim.db \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - uses: ./.github/actions/setup-node

      - name: Run DB migrations
        run: pnpm --filter @moneyforward-daily-action/db run migrate
        env:
          DB_PATH: ${{ github.workspace }}/data/zaim.db
          DRIZZLE_MIGRATIONS_FOLDER: ${{ github.workspace }}/packages/db/drizzle

      - name: Build web app
        run: pnpm build --filter=@moneyforward-daily-action/web
        env:
          DB_PATH: ${{ github.workspace }}/data/zaim.db
          DRIZZLE_MIGRATIONS_FOLDER: ${{ github.workspace }}/packages/db/drizzle
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          NEXT_PUBLIC_GITHUB_ORG: seadoon
          NEXT_PUBLIC_GITHUB_REPO: zaim-dashboard

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
