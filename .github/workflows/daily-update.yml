name: Zaim Daily Update

on:
  schedule:
    # JST 7:00 → UTC 22:00 (前日)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "daily-update"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        env:
          ZAIM_ID: ${{ secrets.ZAIM_ID }}
          RUN_TASK: ${{ vars.RUN_TASK }}
        run: echo "should-run=${{ env.ZAIM_ID != '' && env.RUN_TASK == 'true' }}" >> $GITHUB_OUTPUT

  update:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            google-chrome-stable \
            || (wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && sudo apt-get install -y /tmp/chrome.deb)

      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      - name: Fetch Zaim data
        env:
          ZAIM_ID: ${{ secrets.ZAIM_ID }}
          ZAIM_PASSWORD: ${{ secrets.ZAIM_PASSWORD }}
          FETCH_MONTHS: ${{ vars.FETCH_MONTHS || '3' }}
        run: python crawler/fetch_zaim.py

      - name: Commit and push database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/zaim.db
          git diff --cached --quiet || git commit -m "chore: update zaim database"
          git pull --rebase
          git push
