name: Zaim Daily Update

on:
  schedule:
    # JST 7:00 → UTC 22:00 (前日)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "daily-update"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        env:
          ZAIM_ID: ${{ secrets.ZAIM_ID }}
          RUN_TASK: ${{ vars.RUN_TASK }}
        run: echo "should-run=${{ env.ZAIM_ID != '' && env.RUN_TASK == 'true' }}" >> $GITHUB_OUTPUT

  update:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Download DB from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p data
          aws s3 cp s3://${{ vars.R2_BUCKET_NAME }}/zaim.db data/zaim.db \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            || echo "No existing DB, starting fresh"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            google-chrome-stable \
            || (wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && sudo apt-get install -y /tmp/chrome.deb)

      - name: Install Python dependencies
        run: pip install -r crawler/requirements.txt

      - name: Fetch Zaim data
        env:
          ZAIM_ID: ${{ secrets.ZAIM_ID }}
          ZAIM_PASSWORD: ${{ secrets.ZAIM_PASSWORD }}
          FETCH_MONTHS: ${{ vars.FETCH_MONTHS || '3' }}
        run: python crawler/fetch_zaim.py

      - name: Notify Discord
        if: success()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: python crawler/notify_discord.py

      - name: Upload DB to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp data/zaim.db s3://${{ vars.R2_BUCKET_NAME }}/zaim.db \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
