name: Robofolio Discovery

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node

      - run: pnpm --filter @zaim-dashboard/crawler exec playwright install --with-deps chromium

      - run: pnpm --filter @zaim-dashboard/crawler dev:discover
        env:
          ROBOFOLIO_EMAIL: ${{ secrets.ROBOFOLIO_EMAIL }}
          ROBOFOLIO_PASSWORD: ${{ secrets.ROBOFOLIO_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: discovery-debug
          path: apps/crawler/debug/
          retention-days: 3
