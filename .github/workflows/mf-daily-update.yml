name: MoneyForward Daily Update

on:
  schedule:
    # JST 6:30 → UTC 21:30 (前日)
    - cron: "30 21 * * *"
    # JST 15:20 → UTC 6:20
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "mf-daily-update"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        env:
          MF_EMAIL: ${{ secrets.MF_EMAIL }}
          RUN_TASK: ${{ vars.RUN_TASK }}
        run: echo "should-run=${{ env.MF_EMAIL != '' && env.RUN_TASK == 'true' }}" >> $GITHUB_OUTPUT

  update:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/auth-state-cache
        with:
          mode: restore
          enabled: ${{ vars.CACHE_AUTH_STATE }}
      - run: pnpm --filter @zaim-dashboard/crawler exec playwright install --with-deps chromium
      - run: git fetch origin && git checkout origin/main -- data/zaim.db
      - run: pnpm --filter @zaim-dashboard/crawler start
        env:
          MF_EMAIL: ${{ secrets.MF_EMAIL }}
          MF_PASSWORD: ${{ secrets.MF_PASSWORD }}
          MF_TOTP_SECRET: ${{ secrets.MF_TOTP_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_AVATAR_URL: ${{ secrets.DISCORD_AVATAR_URL }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
      - uses: ./.github/actions/auth-state-cache
        if: always()
        with:
          mode: save
          enabled: ${{ vars.CACHE_AUTH_STATE }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/zaim.db
          git diff --cached --quiet || git commit -m "chore: update mf database"
          git pull --rebase -X ours
          git push
