name: MoneyForward Daily Update

on:
  schedule:
    # JST 12:00 → UTC 3:00
    - cron: "0 3 * * *"
    # JST 15:30 → UTC 6:30
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "mf-daily-update"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        env:
          MF_EMAIL: ${{ secrets.MF_EMAIL }}
          RUN_TASK: ${{ vars.RUN_TASK }}
        run: echo "should-run=${{ env.MF_EMAIL != '' && env.RUN_TASK == 'true' }}" >> $GITHUB_OUTPUT

  update:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/auth-state-cache
        with:
          mode: restore
          enabled: ${{ vars.CACHE_AUTH_STATE }}

      - name: Download DB from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p data
          aws s3 cp s3://${{ vars.R2_BUCKET_NAME }}/zaim.db data/zaim.db \
            --endpoint-url https://46efd80dc4ef7479a2640b44866fc6b9.r2.cloudflarestorage.com \
            || echo "No existing DB, starting fresh"

      - run: pnpm --filter @zaim-dashboard/crawler exec playwright install --with-deps chromium
      - run: pnpm --filter @zaim-dashboard/crawler start
        env:
          MF_EMAIL: ${{ secrets.MF_EMAIL }}
          MF_PASSWORD: ${{ secrets.MF_PASSWORD }}
          MF_TOTP_SECRET: ${{ secrets.MF_TOTP_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_AVATAR_URL: ${{ secrets.DISCORD_AVATAR_URL }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}

      - uses: ./.github/actions/auth-state-cache
        if: always()
        with:
          mode: save
          enabled: ${{ vars.CACHE_AUTH_STATE }}

      - name: Upload DB to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp data/zaim.db s3://${{ vars.R2_BUCKET_NAME }}/zaim.db \
            --endpoint-url https://46efd80dc4ef7479a2640b44866fc6b9.r2.cloudflarestorage.com
